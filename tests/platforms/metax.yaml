platform: metax
vendor: metax

device_types:
  c550:
    memory_gb: 64
    tags: [metax, maca, bf16, fp16, fp32]

tolerance:
  inference:
    default:
      rtol: 1e-3
      atol: 1e-3
    bfloat16:
      rtol: 1e-2
      atol: 1e-2

env_defaults:
  GEMS_VENDOR: "metax"
  VLLM_PLUGINS: "fl"
  MACA_VISIBLE_DEVICES: "0,1,2,3,4,5,6,7"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"

c550:
  name: "c550"
  tests:
    e2e:
      inference:
        qwen3_6: ["27b_tp2_eager"]
      serving:
        qwen3_6: ["35b_a3b_tp2_eager"]
    functional:
      include: "*"
      exclude: []
    unit:
      include: "*"
      exclude: []
    benchmark:
      enabled: true
      smoke: ["serve"]
