platform: musa
vendor: mthreads

device_types:
  s5000:
    memory_gb: 80
    tags: [musa, mthreads, bf16, fp16, fp32]

tolerance:
  inference:
    default:
      rtol: 1e-3
      atol: 1e-3
    bfloat16:
      rtol: 1e-2
      atol: 1e-2

env_defaults:
  GEMS_VENDOR: "mthreads"
  VLLM_PLUGINS: "fl"
  MTHREADS_VISIBLE_DEVICES: "all"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"

s5000:
  name: "s5000"
  tests:
    e2e:
      inference:
        qwen3: ["4b_tp2_eager_musa"]
        qwen3_6: ["27b_tp4_eager_musa"]
      serving:
        qwen3_6: ["35b_a3b_tp4_eager_musa"]
    functional:
      include: "*"
      exclude: []
    unit:
      include: "*"
      exclude: []
    benchmark:
      enabled: true
      smoke: ["serve"]
