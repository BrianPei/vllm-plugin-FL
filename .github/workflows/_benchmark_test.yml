# Reusable benchmark smoke workflow.
#
# Runs lightweight benchmark smoke tests for vllm bench throughput,
# latency, and serve. These tests validate benchmark entrypoints and
# basic plugin integration, not performance regression.

name: Benchmark Smoke Test

on:
  workflow_call:
    inputs:
      platform:
        description: "Platform name (e.g., cuda, ascend)"
        required: true
        type: string
      ci_image:
        description: "Docker image for the test container"
        required: true
        type: string
      runner_labels:
        description: "JSON array of runner labels"
        required: true
        type: string
      runner_set_name:
        description: "FlagCICD runner set name"
        required: false
        type: string
        default: ""
      container_volumes:
        description: "JSON array of volume mounts"
        required: false
        type: string
        default: "[]"
      container_options:
        description: "Docker container options string"
        required: false
        type: string
        default: ""
      timeout:
        description: "Timeout for the job in minutes"
        required: false
        type: number
        default: 30

jobs:
  benchmark-test:
    name: "Benchmark Smoke (${{ inputs.platform }})"
    runs-on: ${{ fromJson(inputs.runner_labels) }}
    timeout-minutes: ${{ inputs.timeout }}
    container:
      image: ${{ inputs.ci_image }}
      volumes: ${{ fromJson(inputs.container_volumes) }}
      options: ${{ inputs.container_options }}

    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 2)
        id: checkout2
        if: steps.checkout1.outcome == 'failure'
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 3)
        if: steps.checkout2.outcome == 'failure'
        uses: actions/checkout@v4

      - name: Check device availability
        run: bash .github/scripts/${{ inputs.platform }}/check.sh

      - name: Install project
        run: bash .github/scripts/${{ inputs.platform }}/setup.sh

      - name: Run benchmark smoke tests
        id: benchmark_test
        run: |
          python tests/run.py \
            --platform ${{ inputs.platform }} \
            --scope benchmark

      - name: Generate benchmark report
        if: always() && steps.benchmark_test.outcome == 'success'
        run: |
          python tests/benchmarks/format_serve_report.py \
            --input benchmark-results/serve_result.json \
            --output benchmark-results/benchmark_metrics.json

      - name: Install jq
        if: always() && steps.benchmark_test.outcome == 'success'
        run: apt-get update && apt-get install -y jq

      - name: Upload benchmark data to backend
        if: always() && steps.benchmark_test.outcome == 'success'
        uses: flagos-ai/FlagOps/actions/post-benchmark-report@main
        env:
          NO_PROXY: "flagcicd-inner.flagos.net"
        with:
          backend_url: 'http://flagcicd-inner.flagos.net:8000'
          user_id: '000000000000000000'
          report_path: benchmark-results/benchmark_metrics.json
          list_code: 'benchmark_${{ inputs.platform }}_vllm_serve_smoke'
          list_name: 'Benchmark-vLLM-Serve-Smoke-${{ inputs.platform }}'
          header_config: '[{"field":"metric","name":"Benchmark Metric","required":true,"sortable":true,"type":"string"},{"field":"values","name":"Per Step Details","required":false,"sortable":false,"type":"array"},{"field":"avg","name":"Avg","required":true,"sortable":true,"type":"number"},{"field":"p50","name":"P50","required":true,"sortable":true,"type":"number"},{"field":"p99","name":"P99","required":true,"sortable":true,"type":"number"}]'
          repository_name: '${{ github.repository }}'
          commit_id: ${{ github.event.pull_request.head.sha || github.sha }}
          workflow_id: ${{ github.run_id }}
          runner_set_name: ${{ inputs.runner_set_name }}
          fail_on_error: 'false'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ inputs.platform }}
          path: |
            test-results-${{ inputs.platform }}.xml
            test-results-${{ inputs.platform }}.json
            benchmark-results/**
